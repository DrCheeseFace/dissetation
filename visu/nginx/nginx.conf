events{}

http {
    upstream frontend_dev_server {
        server frontend-dev:5173;
    }

    upstream go_server {
            server go-server:5155;
    }

    upstream imputer_service {
            server imputer_service:8008;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://frontend_dev_server;
        }

        location /api/ {
            proxy_pass http://go_server/;
        }
        
        location /imputer/ {
            proxy_pass http://imputer_service/;
        }

    }

}
